# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Antigravity (Google DeepMind)"     # AI pair programming assistant for architecture + code

ai_usage_summary: |
  Used Antigravity (Google DeepMind's AI coding assistant) for architecture design,
  iterative code review, and implementation of the pipeline modules (schema.py, extract.py,
  embed.py, rank.py). No candidate data was fed to any LLM. All ranking is performed
  fully offline using local sentence-transformers embeddings and deterministic rule-based
  signal scoring.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid offline ranker: sentence-transformers (all-MiniLM-L6-v2) embedding similarity
  combined with deterministic rule-based scoring across 23 Redrob behavioral signals.

  Composite score = (Embedding Similarity × 0.5) + (Skill Assessment × 0.2) +
                    (Engagement Signals × 0.2) + (Availability/Trust × 0.1)

  All components are then multiplied by a cumulative behavioral_penalty (range 0.05–1.0)
  derived from a 9-filter penalty chain. Penalties are multiplicative (not additive) so
  a single disqualifying signal (e.g., <3yrs experience) cannot be overridden by a high
  skill score. Penalty filters include: experience band gates, WITCH-only career history,
  pure academic background, job-hopping pattern, title inflation, behavioral downweighting
  for inactive candidates, hedging language in descriptions, and absence of production
  IR/vector DB evidence (Pinecone/FAISS/Elasticsearch/NDCG/MRR).

  Candidate embeddings prioritize role history + project descriptions over raw skills list
  to reward semantic evidence of production work and penalize keyword stuffing.
  Runtime: ~4 minutes for 100K candidates on CPU.

